#!/usr/bin/env bash
# rac_env.conf —— 两节点 Oracle 19.3 RAC 全局变量定义
# 所有脚本均 `source /path/rac_env.conf`，只需改这一处
# =====================================================================

# ---------- 节点主机名 / 公网IP / VIP / 私网IP（按需替换）----------
NODE1_HOST=racnode1
NODE2_HOST=racnode2

NODE1_PUB_IP=192.168.10.11        # eth0.1 网卡地址（业务/公网平面）
NODE2_PUB_IP=192.168.10.12
NODE1_VIP=192.168.10.21
NODE2_VIP=192.168.10.22

NODE1_PRIV_IP=10.10.10.11         # eth0.4006 网卡地址（私网心跳/interconnect平面）
NODE2_PRIV_IP=10.10.10.12

SCAN_NAME=rac-scan
SCAN_IP1=192.168.10.31            # 3个SCAN IP同网段，写入/etc/hosts或DNS
SCAN_IP2=192.168.10.32
SCAN_IP3=192.168.10.33
SCAN_PORT=1521

DOMAIN=rac.local

# ---------- 网卡命名：eth0.1=公网 eth0.4006=私网 ----------
PUB_NIC=eth0.1
PRIV_NIC=eth0.4006
PUB_SUBNET=192.168.10.0    # eth0.1所在网段，需与NODE*_PUB_IP匹配
PRIV_SUBNET=10.10.10.0     # eth0.4006所在网段，需与NODE*_PRIV_IP匹配

# ---------- 共享盘（4块 Cinder 卷，来自 nova/cinder multi-attach）----------
# 建议规划：
#   1块 -> +OCR (OCR/Voting, EXTERNAL 冗余最小demo环境；生产建议3块做NORMAL冗余)
#   3块 -> +DATA (数据文件, EXTERNAL冗余)
# 这里给出4块盘的by-id占位符，实际以02脚本自动探测结果为准
ASM_DISKS_OCR="asm-ocr01"
ASM_DISKS_DATA="asm-data01 asm-data02 asm-data03"

ASM_DG_OCR=OCR
ASM_DG_DATA=DATA
ASM_REDUNDANCY_OCR=EXTERNAL
ASM_REDUNDANCY_DATA=EXTERNAL

# ---------- 用户 / 密码 / 目录 ----------
GRID_USER=grid
ORACLE_USER=oracle
INSTALL_GROUP_PRIMARY=oinstall
ASM_GROUPS="asmadmin asmdba asmoper"
DB_GROUPS="dba oper"

# root/grid/oracle 密码：不写死到明文配置文件，运行时通过环境变量注入
# export ROOT_PASSWD='xxx'; export GRID_PASSWD='xxx'; export ORACLE_PASSWD='xxx'

ORACLE_BASE=/u01/app/oracle
GRID_BASE=/u01/app/grid
GRID_HOME=/u01/app/19.3.0/grid
DB_HOME=/u01/app/oracle/product/19.3.0/dbhome_1
INVENTORY_LOC=/u01/app/oraInventory

# ---------- 软件包路径（19.3安装介质，用户已放在根目录）----------
GRID_ZIP=/root/LINUX.X64_193000_grid_home.zip
DB_ZIP=/root/LINUX.X64_193000_db_home.zip

# ---------- 数据库参数 ----------
DB_NAME=orcl
DB_UNIQUE_NAME=orcl
CHARACTER_SET=AL32UTF8
SYS_PASSWORD='Oracle_19c#RAC'   # 仅demo，生产环境请改为交互输入或Vault注入

# ---------- CPU核数/内存相关的huagepages计算(02脚本自动算,此处留作参考) ----------
